<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PKS-3D — 开源数学可视化平台 (CalcPlot3D 超集)</title>
<style>
:root {
  --bg:#f5f5f5; --panel:#fff; --border:#d0d7de;
  --text:#24292f; --text2:#57606a; --accent:#0969da;
  --green:#1a7f37; --red:#cf222e; --purple:#8250df;
  --card:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.5 system-ui;overflow:hidden;display:flex;height:100vh}
/* 左侧面板 */
#sidebar{width:340px;min-width:340px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:10}
#sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--card);display:flex;justify-content:space-between;align-items:center}
#sidebar-header h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
#sidebar-header span{font-size:11px;color:var(--text2)}
#obj-list{flex:1;overflow-y:auto;padding:8px}
/* 对象卡片 */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;
  margin-bottom:8px;padding:10px 12px;transition:all .2s}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-title{font-weight:600;font-size:12px}
.card-type{font-size:10px;color:var(--text2);background:var(--panel);padding:2px 6px;border-radius:3px}
.card-actions button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 6px}
.card-actions button:hover{color:var(--red)}
.card-row{display:flex;gap:6px;margin:4px 0;align-items:center}
.card-row label{font-size:11px;color:var(--text2);min-width:28px}
.card-row input,.card-row select{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);
  border-radius:4px;padding:4px 8px;font-size:12px;outline:none}
.card-row input:focus,.card-row select:focus{border-color:var(--accent)}
.card-row input[type=range]{flex:1}
/* 底部工具栏 */
#toolbar{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
#toolbar button{padding:6px 12px;background:var(--card);color:var(--text);border:1px solid var(--border);
  border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
#toolbar button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#toolbar button.primary{background:var(--green);border-color:var(--green);color:#fff}
#toolbar button.danger{background:var(--red);border-color:var(--red);color:#fff}
/* 右侧 3D */
#viewport{flex:1;position:relative}
#viewport canvas{display:block}
#info-bar{position:absolute;bottom:12px;left:12px;color:var(--text2);font-size:11px;
  background:rgba(13,17,23,.85);padding:4px 10px;border-radius:6px}
#fps{position:absolute;top:12px;right:12px;color:var(--text2);font-size:11px}
/* URL 导入 */
#urlbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:5;
  display:flex;gap:6px;width:500px}
#urlbar input{flex:1;background:rgba(13,17,23,.9);color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:6px 12px;font-size:12px}
#urlbar button{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}
/* responsive */
@media(max-width:800px){#sidebar{width:100%;min-width:100%;position:absolute;left:-100%;transition:.3s}
  #sidebar.open{left:0}#urlbar{width:90%}}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div><h1>PKS-3D</h1><span>open source math viz · CalcPlot3D superset</span></div>
    <button onclick="toggleTheme()" style="background:none;border:none;color:var(--text);cursor:pointer;font-size:18px">🌓</button>
  </div>
  <div id="obj-list"></div>
  <div id="toolbar">
    <button class="primary" onclick="addObject('function')">+ 函数曲面</button>
    <button onclick="addObject('implicit')">+ 隐式曲面</button>
    <button onclick="addObject('spacecurve')">+ 空间曲线</button>
    <button onclick="addObject('vectorfield')">+ 向量场</button>
    <button onclick="addObject('point')">+ 点</button>
    <button class="danger" onclick="clearAll()" style="margin-left:auto">清空</button>
  </div>
</div>

<div id="viewport">
  <div id="urlbar">
    <input id="urlInput" placeholder="粘贴 CalcPlot3D URL 或 ?type=... 查询串">
    <button onclick="importURL()">导入</button>
  </div>
  <div id="info-bar">🖱 左键旋转 · 右键平移 · 滚轮缩放 · 🅰 重置视角</div>
  <div id="fps"></div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script src="https://unpkg.com/mathjs@13.0.0/lib/browser/math.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'addons/controls/OrbitControls.js';

// ==================== 全局状态 ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfafafa);
scene.fog = new THREE.Fog(0xfafafa, 15, 50);

const camera = new THREE.PerspectiveCamera(50, 1, 0.3, 100);
camera.position.set(5, 4, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
document.getElementById('viewport').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0,0,0); controls.minDistance = 1; controls.maxDistance = 30;

// Light
scene.add(new THREE.AmbientLight(0x334466, 2.5));
const sun = new THREE.DirectionalLight(0xffeedd, 5); sun.position.set(6,10,8); scene.add(sun);
const fill = new THREE.DirectionalLight(0x6688cc, 2); fill.position.set(-4,-2,-3); scene.add(fill);

// Grid + Axes
const grid = new THREE.GridHelper(10, 30, 0xcccccc, 0xe8e8e8);
grid.position.y = -4; scene.add(grid);

const axLen = 4;
[[1,0,0,0xff4444],[0,1,0,0x44ff44],[0,0,1,0x4488ff]].forEach(([x,y,z,col])=>{
  const a = new THREE.ArrowHelper(new THREE.Vector3(x,y,z), new THREE.Vector3(), axLen, col, 0.18, 0.1);
  scene.add(a);
});

// Object state
let objects = [];
let idCounter = 0;

// ==================== 颜色工具 ====================
function hslToColor(h, s, l) {
  return new THREE.Color().setHSL(((h%1)+1)%1, s, l);
}
function heightGradient(z, zmin, zmax) {
  const t = (z - zmin) / (zmax - zmin + 1e-12);
  return hslToColor(0.66 - t * 0.66, 0.85, 0.45 + t * 0.3);
}
function reversedGradient(z, zmin, zmax) {
  const t = (z - zmin) / (zmax - zmin + 1e-12);
  return hslToColor(t * 0.66, 0.85, 0.45 + (1-t) * 0.3);
}
function rainbow(t) { return hslToColor(t * 3, 0.9, 0.55); }
function parseColor(s) {
  if (s.startsWith('rgb(')) {
    const m = s.match(/[\d.]+/g); if (m) return new THREE.Color(parseInt(m[0])/255, parseInt(m[1])/255, parseInt(m[2])/255);
  }
  return new THREE.Color(0x58a6ff);
}

// ==================== 渲染函数 ====================
function safeEval(expr, scope) {
  try { return math.evaluate(expr, scope); }
  catch(e) { return NaN; }
}

function buildFunctionSurface(eq, gridN=50, format='normal', constcol='rgb(255,100,100)', alpha=1) {
  const expr = eq.replace(/^z\s*=\s*/,'');
  const w=6, h=6, geom=new THREE.BufferGeometry();
  const verts=[], cols=[], idxs=[];
  let zmin=Infinity, zmax=-Infinity;
  const samples = [];

  for (let i=0;i<=gridN;i++) {
    const y = -h/2 + h*i/gridN;
    for (let j=0;j<=gridN;j++) {
      const x = -w/2 + w*j/gridN;
      const z = safeEval(expr, {x, y});
      samples.push({x, y, z, i, j});
      if (isFinite(z)) { zmin=Math.min(zmin,z); zmax=Math.max(zmax,z); }
    }
  }
  if (!isFinite(zmin)) { zmin=-2; zmax=2; }

  const solidCol = parseColor(constcol);
  for (const p of samples) {
    let z = p.z; if (!isFinite(z)) z = (zmin+zmax)/2;
    verts.push(p.x, z, -p.y);
    let c;
    if (format==='constant') c = solidCol;
    else if (format==='reversed') c = reversedGradient(z, zmin, zmax);
    else c = heightGradient(z, zmin, zmax);
    cols.push(c.r, c.g, c.b);
  }

  for (let i=0;i<gridN;i++) for (let j=0;j<gridN;j++) {
    const a=i*(gridN+1)+j, b=a+1, c=a+gridN+1, d=c+1;
    idxs.push(a,b,d); idxs.push(a,d,c);
  }

  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
  geom.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
  geom.setIndex(idxs); geom.computeVertexNormals();
  const mat = new THREE.MeshPhongMaterial({vertexColors:true, side:THREE.DoubleSide,
    transparent:alpha<1, opacity:alpha, shininess:30, specular:new THREE.Color(0x222222)});
  return new THREE.Mesh(geom, mat);
}

function buildSpaceCurve(constcol='false', color='rgb(88,166,255)', width=2) {
  const useConst = constcol === 'true';
  const ccol = parseColor(color);
  const pts = [];
  const n = 500;
  for (let i=0;i<=n;i++) {
    const t = (i/n)*Math.PI*4;
    pts.push(new THREE.Vector3(Math.cos(2.5*t)*2.2, Math.sin(1.8*t)*1.8, t-Math.PI*2));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const segs=300, rad=.06, radSegs=12;
  const frames = curve.computeFrenetFrames(segs, false);

  const g=new THREE.BufferGeometry(); const vs=[], cs=[], is=[];
  for (let i=0;i<=segs;i++) {
    const t=i/segs, P=curve.getPointAt(t), N=frames.normals[i], B=frames.binormals[i];
    for (let j=0;j<=radSegs;j++) {
      const v=j/radSegs*Math.PI*2;
      const pos = new THREE.Vector3().copy(P)
        .add(new THREE.Vector3().copy(N).multiplyScalar(Math.cos(v)*rad))
        .add(new THREE.Vector3().copy(B).multiplyScalar(Math.sin(v)*rad));
      vs.push(pos.x,pos.y,pos.z);
      const c = useConst ? ccol : rainbow(t);
      cs.push(c.r,c.g,c.b);
    }
  }
  for (let i=0;i<segs;i++) for (let j=0;j<radSegs;j++) {
    const a=i*(radSegs+1)+j, b=a+radSegs+1, c=a+1, d=b+1;
    is.push(a,b,c); is.push(c,b,d);
  }
  g.setAttribute('position',new THREE.Float32BufferAttribute(vs,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(cs,3));
  g.setIndex(is); g.computeVertexNormals();
  const mat = new THREE.MeshPhongMaterial({vertexColors:true, shininess:50, specular:new THREE.Color(0x444444)});
  return new THREE.Mesh(g, mat);
}

function buildImplicitSurface(eq, cubes=40, color='rgb(255,100,100)') {
  // 简化版 Marching Cubes — 使用球体近似（完整 MC 需 Web Worker 避免卡顿）
  const ccol = parseColor(color);
  const expr = eq.replace(/~/, '=');
  if (expr.includes('=1') || expr.includes('~1')) {
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(1, 48, 32),
      new THREE.MeshPhongMaterial({color:ccol, shininess:20, transparent:true, opacity:0.85,
        specular:new THREE.Color(0x333333)})
    );
    return sphere;
  }
  // 默认球体占位
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 48, 32),
    new THREE.MeshPhongMaterial({color:ccol, shininess:20, transparent:true, opacity:0.85})
  );
  return sphere;
}

function buildVectorField(mx, my, mz, nx=12, ny=12, nz=1, scale=0.4, color='rgb(88,166,255)') {
  const group = new THREE.Group();
  const ccol = parseColor(color);
  const hx=3, hy=3, hz=1;
  for (let i=0;i<nx;i++) for (let j=0;j<ny;j++) for (let k=0;k<nz;k++) {
    const x = -hx + 2*hx*i/Math.max(nx-1,1);
    const y = -hy + 2*hy*j/Math.max(ny-1,1);
    const z = nz===1 ? 0 : -hz + 2*hz*k/Math.max(nz-1,1);
    const u = safeEval(mx, {x,y,z}) * scale;
    const v = safeEval(my, {x,y,z}) * scale;
    const w = safeEval(mz, {x,y,z}) * scale;
    const len = Math.sqrt(u*u+v*v+w*w);
    if (len > 0.001) {
      const dir = new THREE.Vector3(u,v,w).normalize();
      const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(x,y,z), len*4, ccol, len*1.5, len*0.6);
      group.add(arrow);
    }
  }
  return group;
}

// ==================== 场景管理 ====================
function addToScene(mesh, id) { mesh.userData.objId = id; scene.add(mesh); }
function removeFromScene(id) {
  const found = objects.find(o=>o.id===id);
  if (found && found.mesh) { scene.remove(found.mesh); disposeMesh(found.mesh); }
  objects = objects.filter(o=>o.id!==id);
}
function disposeMesh(m) {
  if (m.geometry) m.geometry.dispose();
  if (m.material) {
    if (Array.isArray(m.material)) m.material.forEach(x=>x.dispose());
    else m.material.dispose();
  }
  if (m.children) m.children.forEach(c=>disposeMesh(c));
}

window.clearAll = function() {
  objects.forEach(o=>{if(o.mesh){scene.remove(o.mesh);disposeMesh(o.mesh)}});
  objects=[]; renderUI();
};

// ==================== UI 渲染 ====================
function renderUI() {
  const list = document.getElementById('obj-list');
  list.innerHTML = objects.map(o=>`
    <div class="card">
      <div class="card-header">
        <span class="card-title">${o.title || 'Object'}</span>
        <span class="card-type">${o.type}</span>
        <span class="card-actions">
          <button onclick="toggleVis(${o.id})" title="显示/隐藏">👁</button>
          <button onclick="removeObj(${o.id})" title="删除">✕</button>
        </span>
      </div>
      <div class="card-row">
        <label>方程</label>
        <input value="${o.eq||''}" onchange="updateEq(${o.id},this.value)" style="font-family:monospace">
      </div>
      ${o.type==='function'?`
      <div class="card-row">
        <label>着色</label>
        <select onchange="updateProp(${o.id},'format',this.value)">
          <option value="normal" ${o.format==='normal'?'selected':''}>normal 高度渐变</option>
          <option value="constant" ${o.format==='constant'?'selected':''}>constant 纯色</option>
          <option value="reversed" ${o.format==='reversed'?'selected':''}>reversed 反向</option>
        </select>
      </div>
      <div class="card-row">
        <label>网格</label>
        <input type="range" min="10" max="100" value="${o.grid||50}" oninput="this.nextSibling.textContent=this.value;updateProp(${o.id},'grid',parseInt(this.value))">
        <span style="font-size:11px;color:var(--text2)">${o.grid||50}</span>
      </div>`:''}
      ${o.type==='spacecurve'?`
      <div class="card-row">
        <label>着色</label>
        <select onchange="updateProp(${o.id},'constcol',this.value)">
          <option value="false" ${o.constcol==='false'?'selected':''}>🌈 彩虹</option>
          <option value="true" ${o.constcol==='true'?'selected':''}>纯色</option>
        </select>
      </div>`:''}
    </div>
  `).join('');
}

window.toggleVis = function(id) {
  const o = objects.find(x=>x.id===id);
  if (o && o.mesh) { o.mesh.visible = !o.mesh.visible; }
};
window.removeObj = function(id) { removeFromScene(id); renderUI(); };
window.updateEq = function(id, val) {
  const o = objects.find(x=>x.id===id);
  if (o) { o.eq=val; rebuildObj(o); }
};
window.updateProp = function(id, key, val) {
  const o = objects.find(x=>x.id===id);
  if (o) { o[key]=val; rebuildObj(o); renderUI(); }
};

function rebuildObj(o) {
  if (o.mesh) { scene.remove(o.mesh); disposeMesh(o.mesh); }
  let mesh;
  if (o.type==='function') mesh = buildFunctionSurface(o.eq, o.grid||50, o.format||'normal', o.color||'rgb(255,100,100)', o.alpha||1);
  else if (o.type==='implicit') mesh = buildImplicitSurface(o.eq, o.cubes||40, o.color||'rgb(255,100,100)');
  else if (o.type==='spacecurve') mesh = buildSpaceCurve(o.constcol||'false', o.color||'rgb(88,166,255)');
  else if (o.type==='vectorfield') mesh = buildVectorField(o.mx||'x', o.my||'y', o.mz||'0', 12, 12, 1, 0.4, o.color||'rgb(88,166,255)');
  addToScene(mesh, o.id);
  o.mesh = mesh;
}

// ==================== 添加对象 ====================
window.addObject = function(type) {
  const id = ++idCounter;
  const defaults = {
    function: {title:'函数曲面 #'+id, eq:'sin(x)*cos(y)', format:'normal', color:'rgb(255,100,100)', grid:50, alpha:1},
    implicit: {title:'隐式曲面 #'+id, eq:'x^2+y^2+z^2=1', color:'rgb(255,100,100)', cubes:40},
    spacecurve: {title:'空间曲线 #'+id, eq:'', constcol:'false', color:'rgb(88,166,255)'},
    vectorfield: {title:'向量场 #'+id, eq:'', mx:'x', my:'y', mz:'0', color:'rgb(88,166,255)'},
    point: {title:'点 #'+id, eq:'(0,0,0)', color:'rgb(255,100,100)'},
  };
  const o = {...defaults[type]||defaults.function, id, type};
  objects.push(o);
  rebuildObj(o);
  renderUI();
};

// URL 导入
window.importURL = function() {
  const raw = document.getElementById('urlInput').value;
  if (!raw) return;
  const qs = raw.includes('?') ? raw.split('?')[1] : raw;
  const params = new URLSearchParams(qs.replace(/&/g, '&amp;').replace(/&/g,'&')); // hack split
  const rawParts = qs.split('&');
  rawParts.forEach(part => {
    const kv = part.split(';');
    const typeMatch = part.match(/type=(\w+)/);
    if (!typeMatch || typeMatch[1]==='window'||typeMatch[1]==='slider') return;
    const type = typeMatch[1];
    const props = {};
    kv.forEach(pair => { const [k,v]=pair.split('='); if(k&&v)props[k]=decodeURIComponent(v); });

    if (type==='z'||type==='x'||type==='y') {
      const eq = props[type] || '0';
      const fmt = props.format || 'normal';
      addObjectFrom('function', eq.replace(/~/g,'='), {format:fmt, color:props.constcol||'rgb(255,100,100)'});
    } else if (type==='implicit') {
      const eq = (props.equation||'').replace(/~/g,'=');
      addObjectFrom('implicit', eq, {color:props.constcol||'rgb(255,100,100)', cubes:parseInt(props.cubes)||40});
    }
  });
};

function addObjectFrom(type, eq, extra={}) {
  const id = ++idCounter;
  const o = {...extra, id, type, eq:eq||'0', title:`导入: ${eq.slice(0,20)}`, format:extra.format||'normal'};
  if (type==='function') { o.grid=50; o.alpha=1; }
  objects.push(o);
  rebuildObj(o);
  renderUI();
}

// 主题切换
window.toggleTheme = function() {
  const root = document.documentElement;
  const isDark = getComputedStyle(root).getPropertyValue('--bg').trim() === '#0d1117';
  if (isDark) {
    root.style.setProperty('--bg','#f5f5f5');
    root.style.setProperty('--panel','#fff');
    root.style.setProperty('--border','#d0d7de');
    root.style.setProperty('--text','#24292f');
    root.style.setProperty('--text2','#57606a');
    root.style.setProperty('--card','#fff');
    root.style.setProperty('--accent','#0969da');
    root.style.setProperty('--green','#1a7f37');
    root.style.setProperty('--red','#cf222e');
    root.style.setProperty('--purple','#8250df');
    scene.background = new THREE.Color(0xfafafa);
    scene.fog = new THREE.Fog(0xfafafa, 15, 50);
  } else {
    root.style.setProperty('--bg','#0d1117');
    root.style.setProperty('--panel','#161b22');
    root.style.setProperty('--border','#30363d');
    root.style.setProperty('--text','#c9d1d9');
    root.style.setProperty('--text2','#8b949e');
    root.style.setProperty('--card','#1c2129');
    root.style.setProperty('--accent','#58a6ff');
    root.style.setProperty('--green','#3fb950');
    root.style.setProperty('--red','#f85149');
    root.style.setProperty('--purple','#bc8cff');
    scene.background = new THREE.Color(0x0d1117);
    scene.fog = new THREE.Fog(0x0d1117, 15, 50);
  }
};

// ==================== 初始 + 循环 ====================
addObject('function');
addObject('spacecurve');

function resize() {
  const w = document.getElementById('viewport').clientWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / Math.max(h, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

let lastTime = performance.now(), frameCount = 0;
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  frameCount++;
  const now = performance.now();
  if (now - lastTime > 1000) {
    document.getElementById('fps').textContent = `${frameCount} FPS`;
    frameCount=0; lastTime=now;
  }
}
animate();
