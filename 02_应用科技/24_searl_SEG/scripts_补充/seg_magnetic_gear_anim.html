<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEG 三层定子+三层滚筒 — 修正版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0e0e0;font-family:system-ui;
  display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.1em;font-weight:500;margin:6px 0;color:#b8c8ff}
.row{display:flex;gap:12px;align-items:flex-start;margin:6px}
.canvas-wrap{position:relative}
canvas{border:1px solid #1a2a44;border-radius:10px}
.legend{font-size:0.72em;color:#8899bb;line-height:1.8;padding:10px;
  background:#11112a;border-radius:8px;min-width:200px}
.legend b{display:block;margin-bottom:4px}
.legend .s{color:#c90}.legend .r{color:#1d9e75}
.legend .s2{color:#7c3}.legend .r2{color:#378add}
.legend .s3{color:#39c}.legend .r3{color:#ba7517}
.btns{display:flex;gap:6px;margin:6px 0;flex-wrap:wrap;justify-content:center}
.btns button{padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-size:11px;color:#fff}
.btns button:hover{filter:brightness(1.3)}
</style>
</head>
<body>
<h1>SEG 六环 — 定子向内收缩 · 滚筒包裹内定子</h1>

<div class="row">
<div class="canvas-wrap">
<canvas id="c" width="720" height="720"></canvas>
</div>
<div class="legend">
<b>六环结构（从外到内）</b>
<span class="r">● 外滚筒 ×N个(每34极)</span><br>
<span class="s">● 外定子 18,522极</span><br>
<span class="r2">● 中滚筒 ×N个(每34极)</span><br>
<span class="s2">● 中定子 11,466极</span><br>
<span class="r3">● 内滚筒 ×N个(每34极) 包裹</span><br>
<span class="s3">● 内定子 4,410极(中心)</span><br>
<hr>
<span style="color:#ff6060">● N极</span>
<span style="color:#6080ff">● S极</span>
</div>
</div>

<div class="btns">
<button style="background:#1d9e75" onclick="switchCfg(0)">Fibonacci 34/21/13</button>
<button style="background:#ba7517" onclick="switchCfg(1)">原版 32/22/12</button>
<button style="background:#ba7517" onclick="switchCfg(2)">最优 38/25/16</button>
<button style="background:#e24b4a" onclick="switchCfg(3)">整除 30/20/10</button>
<button style="background:#378add" onclick="p=!p">⏯</button>
<span style="font-size:0.7em;color:#8899bb;margin-left:12px" id="info"></span>
</div>

<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
const CX=360,CY=360;

// 定子磁极数（外→中→内）
const SP=[18522,11466,4410];
const RP=34; // 每滚筒34极

// ★ 修正后的几何：定子向内收缩 ★
// 外滚筒在最外层，外定子在外滚筒内侧
// 中滚筒在外定子内侧，中定子在中滚筒内侧
// 内滚筒在中定子内侧，包裹着内定子（内定子最小，在中心）
const RR_OUTER=295;  // 外滚筒轨道（最外层旋转件）
const RS_OUTER=245;  // 外定子（外滚筒内侧，固定）
const RR_MID  =195;  // 中滚筒轨道
const RS_MID  =148;  // 中定子
const RR_INNER=100;  // 内滚筒轨道（包裹内定子）
const RS_INNER=48;   // 内定子（最小，中心，被内滚筒包裹）
const TR=12;         // 滚筒半径
const TP=3;          // 磁极点大小

// 配置
const CFGS=[
  [34,21,13,'Fibonacci 34/21/13','#1d9e75'],
  [32,22,12,'原版 32/22/12','#ba7517'],
  [38,25,16,'最优 38/25/16','#ba7517'],
  [30,20,10,'整除 30/20/10','#e24b4a'],
];
let ci=0,angle=0,p=false,speed=1;
function switchCfg(i){ci=i;angle=0;}
cv.addEventListener('wheel',e=>{e.preventDefault();speed=Math.max(0.2,Math.min(4,speed+(e.deltaY>0?-0.3:0.3)));});

function drawStator(r,nPoles,label,color){
  // 环线
  x.beginPath();x.arc(CX,CY,r,0,2*Math.PI);
  x.strokeStyle=color;x.lineWidth=3;x.stroke();
  // 标签
  x.fillStyle=color;x.font='bold 9px system-ui';x.textAlign='center';
  x.fillText(label+' '+nPoles.toLocaleString()+'极',CX,CY-r-6);
  // 示意磁极
  const dc=Math.min(nPoles,80);
  for(let i=0;i<dc;i++){
    const a=2*Math.PI*i/dc;
    const px=CX+r*Math.cos(a),py=CY+r*Math.sin(a);
    x.beginPath();x.arc(px,py,2,0,2*Math.PI);
    x.fillStyle=i%2===0?'#ff6060':'#6080ff';x.fill();
  }
}

function drawRollers(rOrbit,nRollers,orbitAngle,spinRatio,color,label){
  // 轨道线（虚线）
  x.beginPath();x.arc(CX,CY,rOrbit,0,2*Math.PI);
  x.setLineDash([5,8]);x.strokeStyle=color;x.lineWidth=1.5;x.stroke();
  x.setLineDash([]);
  // 标签
  x.fillStyle=color;x.font='bold 10px system-ui';x.textAlign='left';
  const la=2.9;
  x.fillText(label+' ×'+nRollers,CX+rOrbit*Math.cos(la),CY+rOrbit*Math.sin(la)+4);
  
  const oa=orbitAngle;
  for(let j=0;j<nRollers;j++){
    const th=oa+2*Math.PI*j/nRollers;
    const rcx=CX+rOrbit*Math.cos(th),rcy=CY+rOrbit*Math.sin(th);
    // 填充
    x.beginPath();x.arc(rcx,rcy,TR,0,2*Math.PI);
    x.fillStyle=color+'30';x.fill();
    // 轮廓
    x.beginPath();x.arc(rcx,rcy,TR,0,2*Math.PI);
    x.strokeStyle=color;x.lineWidth=2;x.stroke();
    // 磁极
    const spin=th*spinRatio;
    for(let k=0;k<12;k++){
      const pa=spin+2*Math.PI*k/12;
      const px=rcx+(TR-3)*Math.cos(pa),py=rcy+(TR-3)*Math.sin(pa);
      x.beginPath();x.arc(px,py,TP,0,2*Math.PI);
      x.fillStyle=k%2===0?'#ff6060':'#6080ff';x.fill();
    }
  }
}

function draw(){
  x.clearRect(0,0,720,720);
  x.fillStyle='#0a0a14';x.fillRect(0,0,720,720);
  
  const cf=CFGS[ci],no=cf[0],nm=cf[1],ni=cf[2],name=cf[3],col=cf[4];
  
  const ao=angle,am=angle*1.5,ai=angle*2.2;
  
  // 绘图顺序：从外到内
  
  // 1. 外滚筒（最外层旋转件）
  drawRollers(RR_OUTER,no,ao,1.6,'#1d9e75','外滚筒');
  
  // 2. 外定子（外滚筒内侧，固定）
  drawStator(RS_OUTER,SP[0],'外定子','#c90');
  
  // 3. 中滚筒
  drawRollers(RR_MID,nm,am,2.3,'#378add','中滚筒');
  
  // 4. 中定子
  drawStator(RS_MID,SP[1],'中定子','#7c3');
  
  // 5. 内滚筒（包裹内定子）
  drawRollers(RR_INNER,ni,ai,3.2,'#ba7517','内滚筒');
  
  // 6. 内定子（最小，中心，被内滚筒包裹）
  drawStator(RS_INNER,SP[2],'内定子','#39c');
  
  // gcd 分析
  function gcd(a,b){return b===0?Math.abs(a):gcd(b,a%b);}
  const go=gcd(SP[0]/2,RP/2),gm=gcd(SP[1]/2,RP/2),gi=gcd(SP[2]/2,RP/2);
  const all1=go===1&&gm===1&&gi===1;
  
  // 中心标签
  x.fillStyle='#b8c8ff';x.font='bold 11px system-ui';x.textAlign='center';
  x.fillText(name+'  每滚筒'+RP+'极',CX,CY+20);
  x.fillStyle=all1?'#1d9e75':'#e24b4a';x.font='bold 11px system-ui';
  x.fillText(all1?'三层全互质 磁静音 ✓':'gcd='+[go,gm,gi]+' 磁振动 ✗',CX,CY+36);
  
  // 说明
  x.fillStyle='#666';x.font='9px system-ui';
  x.fillText('定子向内收缩·内定子被内滚筒包裹 | 🔴N 🔵S | 滚轮调速',CX,CY+52);
  
  requestAnimationFrame(draw);
}

setInterval(()=>{
  if(!p){angle+=0.007*speed;
    const cf=CFGS[ci];
    document.getElementById('info').textContent=
      `外${cf[0]}/中${cf[1]}/内${cf[2]}滚筒 | ${cf[3]} | 速度${speed}x`;
  }
},16);
draw();
</script>
</body>
</html>
