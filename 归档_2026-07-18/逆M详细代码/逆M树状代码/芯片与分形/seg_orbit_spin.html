let cfg=ALL_CFGS[5],angle=0,speed=1,paused=false; // 默认🏭统一34极混合
let particles=[];
let curRollers=[34,21,13];

// 滚轮调速 0.1× ~ 4×
cv.addEventListener('wheel',e=>{e.preventDefault();speed=Math.max(0.1,Math.min(4,speed+(e.deltaY>0?-0.2:0.2)));updSpeed();});
// 点击暂停
cv.addEventListener('click',()=>{paused=!paused;});
const ROLLERS=[34,21,13];

function gcd(a,b){return b===0?Math.abs(a):gcd(b,a%b);}
function lcm(a,b){return a*b/gcd(a,b);}

function smoothScore(){
  const sp=cfg.sp,rp=cfg.rp;
  // 极对数
  const pi=sp[0]/2, pm=sp[1]/2, po=sp[2]/2;
  let s=0;
  // 单环互质（满分66）
  for(let i=0;i<3;i++){if(gcd(sp[i]/2,rp[i]/2)===1)s+=22;}
  // 交叉gcd（满分9）——越低越好
  const cg12=gcd(pi,pm), cg23=gcd(pm,po);
  s+=18*(1/(cg12+1)+1/(cg23+1))/2;
  // 滚筒差异化+制造统一性（满分14）
  const diff=(rp[0]!==rp[1])+(rp[1]!==rp[2])+(rp[0]!==rp[2]);
  s+=diff*2;  // 差异化降权（3个全不同=6分）
  if(rp[0]===rp[1] && rp[1]===rp[2]) s+=8;  // 统一极数→1套充磁电路→省成本+8分
  // ★ LCM奖励（越大→对齐周期越长→退磁越均匀→寿命越长）★
  const totalLCM=lcm(lcm(pi,pm),po);
  s+=Math.log10(totalLCM+1)*0.9;  // 素数LCM≈2e11→log≈11.3→加分≈10
  return Math.min(100,Math.round(s));
}

function initParticles(){
  particles=[];
  const N=300;
  // 从三个滚筒环表面的发射点初始化
  const rings=[
    {rMin:RR_INNER-TR,rMax:RR_INNER+TR, nRollers:curRollers[2], speed:1, rOrbit:RR_INNER},
    {rMin:RR_MID-TR,rMax:RR_MID+TR, nRollers:curRollers[1], speed:2.5, rOrbit:RR_MID},
    {rMin:RR_OUTER-TR,rMax:RR_OUTER+TR, nRollers:curRollers[0], speed:6.25, rOrbit:RR_OUTER},
  ];
  for(let i=0;i<N;i++){
    const ri=Math.floor(Math.random()*3);
    const ring=rings[ri];
    const r=ring.rMin+Math.random()*(ring.rMax-ring.rMin);
    const a=Math.random()*2*Math.PI;
    // 径向速度（场致发射：向外加速）
    const vr=0.02+Math.random()*0.08;
    // 切向速度（被旋转磁场拖曳）
    const vt=ring.speed*0.01*(0.5+Math.random());
    particles.push({
      r,a,vr,vt,
      ring:ri,life:1,alpha:0.3+Math.random()*0.5,
      emitA:a,emitR:r,
    });
  }
}

function updateParticles(){
  const sc=smoothScore();
  // 磁场粗糙度：gcd越差→B场空间变化越大→粒子被"凸起"聚集
  const roughness=Math.max(0.005,(100-sc)/100*0.25);
  // 径向扩散：gcd好→电场均匀→粒子均匀扩散；gcd差→电场局部增强→粒子局部加速
  const radialUniformity=sc/100; // 1=均匀扩散, 0=△中等
  
  particles.forEach(p=>{
    p.life-=0.001;
    if(p.life<=0){
      // 重生：从发射点重新初始化
      const rings=[
        {rMin:RR_INNER-TR,rMax:RR_INNER+TR},
        {rMin:RR_MID-TR,rMax:RR_MID+TR},
        {rMin:RR_OUTER-TR,rMax:RR_OUTER+TR},
      ];
      const ri=Math.floor(Math.random()*3);
      p.ring=ri;
      p.r=rings[ri].rMin+Math.random()*(rings[ri].rMax-rings[ri].rMin);
      p.a=Math.random()*2*Math.PI;
      p.vr=0.02+Math.random()*0.08;
      p.vt=[1,2.5,6.25][ri]*0.01*(0.5+Math.random());
      p.life=1;
      p.alpha=0.3+Math.random()*0.5;
      p.emitA=p.a; p.emitR=p.r;
      return;
    }
    
    // ★ 物理驱动的运动 ★
    // 1. E场径向加速（场致发射→向外）
    const rFrac=p.r/320;
    const eForce=0.0008*(1+rFrac); // 外环电场更强
    p.vr+=eForce*radialUniformity;
    
    // 2. B场切向偏转（磁极→洛伦兹力）
    //    gcd好→B场空间平滑→偏转均匀；gcd差→B场有"齿"→周期性聚团
    const bAngle=p.a*(p.ring+1)*3; // 每个环的磁极空间频率不同
    const bForce=roughness*Math.sin(bAngle);
    p.vt+=bForce*0.001;
    
    // 3. 摩擦力（空间电荷碰撞→扩散）
    p.vr*=0.998;
    p.vt*=0.998;
    
    // 更新位置
    p.r+=p.vr;
    p.a+=p.vt/p.r;
    
    // 边界：超出外环后重生
    if(p.r>330){p.life=0;}
    if(p.r<20){p.r=20;p.vr*=-0.5;}
  });
}

function drawParticles(){
  updateParticles();
  
  // 计算空间电荷密度分布（用于着色）
  // 简单的径向binning
  const bins=40;
  const density=new Array(bins).fill(0);
  particles.forEach(p=>{
    const bi=Math.min(bins-1,Math.floor(p.r/330*bins));
    if(bi>=0&&bi<bins)density[bi]++;
  });
  const maxD=max(density,1);
  
  particles.forEach(p=>{
    if(p.life<=0)return;
    const px=CX+p.r*Math.cos(p.a);
    const py=CY+p.r*Math.sin(p.a);
    const bi=Math.min(bins-1,Math.floor(p.r/330*bins));
    const dNorm=density[bi]/maxD;
    
    // 颜色：密度低→暗黄，密度高→亮白
    const r=Math.floor(200+55*dNorm);
    const g=Math.floor(180+75*dNorm);
    const bb=Math.floor(40+40*dNorm);
    const alpha=p.alpha*(0.3+0.7*dNorm);
    
    x.beginPath();x.arc(px,py,1.8,0,2*Math.PI);
    x.fillStyle=`rgba(${r},${g},${bb},${alpha})`;
    x.fill();
  });
}

function max(arr,d){let m=d;for(let v of arr){if(v>m)m=v;}return m;}

// ★ 定子：红蓝弧段显示真实磁极密度 ★
function drawStator(r,nP,label,color){
  // 底环
  x.beginPath();x.arc(CX,CY,r,0,2*Math.PI);
  x.strokeStyle='rgba(255,255,255,0.1)';x.lineWidth=4;x.stroke();
  
  // 磁极弧段：每极画一小段彩色弧
  const da=2*Math.PI/nP;
  const visiblePoles=Math.min(nP,360); // 最多360段（每1°一段），保持视觉密度
  const step=nP/visiblePoles;
  for(let i=0;i<visiblePoles;i++){
    const a=2*Math.PI*i/visiblePoles;
    const isN=Math.floor(i*step)%2===0;
    x.beginPath();
    x.arc(CX,CY,r,a,a+da*step*0.85); // 85%占空比留缝
    x.strokeStyle=isN?'rgba(255,80,80,0.7)':'rgba(80,130,255,0.7)';
    x.lineWidth=4;x.stroke();
  }
  
  // 标签
  x.fillStyle=color;x.font='bold 7px system-ui';x.textAlign='center';
  x.fillText(label+' '+nP.toLocaleString()+'极',CX,CY-r-8);
}

// ★ 滚筒：显示实际磁极数（22/26/34/38个标记）★
function drawRollers(rOrbit,nR,orbitA,pPerRoller,color,label){
  // 轨道线
  x.beginPath();x.arc(CX,CY,rOrbit,0,2*Math.PI);
  x.setLineDash([3,5]);x.strokeStyle=color+'60';x.lineWidth=1;x.stroke();x.setLineDash([]);
  
  for(let j=0;j<nR;j++){
    const th=orbitA+2*Math.PI*j/nR;
    const rcx=CX+rOrbit*Math.cos(th),rcy=CY+rOrbit*Math.sin(th);
    
    // 滚筒底
    x.beginPath();x.arc(rcx,rcy,TR,0,2*Math.PI);
    x.fillStyle=color+'18';x.fill();
    x.beginPath();x.arc(rcx,rcy,TR,0,2*Math.PI);
    x.strokeStyle=color;x.lineWidth=2;x.stroke();
    
    // ★ 真实磁极数：红蓝方点交替 ★
    const spA=th*(rOrbit/TR); // 自转角度
    for(let k=0;k<pPerRoller;k++){
      const pa=spA+2*Math.PI*k/pPerRoller;
      const px=rcx+(TR-3)*Math.cos(pa), py=rcy+(TR-3)*Math.sin(pa);
      const sz=pPerRoller>30?1.5:2.5;
      x.fillStyle=k%2===0?'#ff5050':'#5080ff';
      x.fillRect(px-sz/2,py-sz/2,sz,sz);
    }
    
    // 自转白点（一个即可，太多会乱）
    const mx=rcx+(TR-1)*Math.cos(spA),my=rcy+(TR-1)*Math.sin(spA);
    x.beginPath();x.arc(mx,my,2.5,0,2*Math.PI);
    x.fillStyle='#fff';x.fill();
  }
}

function buildDropdown(){
  const sel=document.getElementById('cfgSelect');
  ALL_CFGS.forEach((c,i)=>{
    const o=document.createElement('option');o.value=i;o.textContent=c.name;
    if(c.st==='fail')o.style.color='#e24b4a';
    else if(c.id.startsWith('phi'))o.style.color='#1d9e75';
    sel.appendChild(o);
  });
  sel.value=1;
}

function loadCfg(idx){cfg=ALL_CFGS[idx];curRollers=cfg.rolls||[34,21,13];initParticles();updateStatus();}
function updSpeed(){document.getElementById('spd').textContent=speed+'x';}

function updateStatus(){
  const sp=cfg.sp,rp=cfg.rp,sc=smoothScore();
  const g1=gcd(sp[0]/2,rp[0]/2),g2=gcd(sp[1]/2,rp[1]/2),g3=gcd(sp[2]/2,rp[2]/2);
  const all1=g1===1&&g2===1&&g3===1;
  document.getElementById('statusBar').innerHTML=
    `<span class="${all1?'good':'bad'}">${all1?'✓ 全互质':'✗ 公约数'}</span> | `+
    `内${sp[0]}/${rp[0]}极 中${sp[1]}/${rp[1]}极 外${sp[2]}/${rp[2]}极 | `+
    `外/中=${(sp[2]/sp[1]).toFixed(3)} 中/内=${(sp[1]/sp[0]).toFixed(3)} | `+
    `外6.25× 中2.5× 内1×`;
  const fill=document.getElementById('smoothFill');
  fill.style.width=sc+'%';
  fill.style.background=sc>=80?'#1d9e75':sc>=50?'#ba7517':'#e24b4a';
  document.getElementById('smoothVal').textContent=sc+'分';
}

function draw(){
  x.clearRect(0,0,740,740);
  x.fillStyle='#0a0a14';x.fillRect(0,0,740,740);
  
  const rp=cfg.rp,sp=cfg.sp;
  const ai=angle,am=angle*2.5,ao=angle*6.25;
  
  // 粒子云（最底层，暗色）
  drawParticles();
  
  // 结构环
  drawRollers(RR_OUTER,curRollers[0],ao,rp[2],'#1d9e75','外');
  drawStator(RS_OUTER,sp[2],'外定子','#c90');
  drawRollers(RR_MID,curRollers[1],am,rp[1],'#378add','中');
  drawStator(RS_MID,sp[1],'中定子','#7c3');
  drawRollers(RR_INNER,curRollers[2],ai,rp[0],'#ba7517','内');
  drawStator(RS_INNER,sp[0],'内定子','#39c');
  
  const sc=smoothScore();
  x.fillStyle='#b8c8ff';x.font='bold 9px system-ui';x.textAlign='center';
  x.fillText((cfg.name.split('★ ')[1]||cfg.name).substring(0,50),CX,CY-18);
  x.fillStyle=sc>=80?'#1d9e75':sc>=50?'#ba7517':'#e24b4a';
  x.fillText(`综合性价比得分 ${sc}分 ${sc>=80?'✦⚡高分':sc>=50?'△△中等':'✗✗低分'}`,CX,CY-2);
  x.fillStyle='#556';x.font='7px system-ui';
  x.fillText('粒子=场致发射电子云 | 红蓝弧段=真实磁极密度 | 滚筒方点=精确极数 | 外6.25×中2.5×内1×',CX,CY+16);
  
  requestAnimationFrame(draw);
}

setInterval(()=>{if(!paused)angle+=0.005*speed;},16);
